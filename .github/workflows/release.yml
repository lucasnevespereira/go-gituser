name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          LDFLAGS="-s -w -X github.com/lucasnevespereira/go-gituser/cmd.AppVersion=$VERSION"

          for pair in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os=${pair%/*}; arch=${pair#*/}
            echo "building gituser-$os-$arch"
            GOOS=$os GOARCH=$arch go build -ldflags "$LDFLAGS" -o "bin/gituser-$os-$arch" ./cmd/gituser
          done

      - name: Package
        run: |
          cd bin
          for f in gituser-*; do
            tar -czf "$f.tar.gz" "$f"
            rm "$f"
          done
          sha256sum *.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: |
            bin/*.tar.gz
            bin/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false

  homebrew:
    name: Update Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update tap formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: gituser
          formula-path: gituser.rb
          homebrew-tap: lucasnevespereira/homebrew-tools
          tag-name: ${{ steps.version.outputs.tag }}
          commit-message: "gituser ${{ steps.version.outputs.tag }}"
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}